# Cloudflare Tunnel configuration for finance-analyzer dashboard
# This file is generated/updated by setup_tunnel.bat
#
# Location: %USERPROFILE%\.cloudflared\config.yml
# Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/

tunnel: TUNNEL_ID_HERE
credentials-file: CREDENTIALS_PATH_HERE

# noTLSVerify is intentionally omitted — origin is plain HTTP, so TLS
# verification is moot. Adding it to a plain-HTTP origin would mask the
# misconfiguration of someone later switching the origin to https:// with
# a self-signed cert, silently bypassing cert validation.
ingress:
  # Canonical apex (added 2026-04-30 — short URL, replaces the old GH Pages
  # path-based redirect)
  - hostname: raanman.lol
    service: http://localhost:5055
    originRequest:
      connectTimeout: 30s

  # Legacy alias kept working for existing bookmarks
  - hostname: bets.raanman.lol
    service: http://localhost:5055
    originRequest:
      connectTimeout: 30s

  # Catch-all: return 404 for unmatched hostnames
  - service: http_status:404
