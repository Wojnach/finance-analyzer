; mypy strict-pilot configuration — finance-analyzer
;
; Pilot scope (2026-05-10): 4 hot modules where Claude-introduced type
; errors carry the most blast-radius if they slip into production.
;
; Profile rationale: full ``--strict`` produces ~70 errors on these 4
; files, almost all missing-annotation chore work. The pragmatic gate
; below catches the SHARP type errors — wrong dict-key types, Any leaks,
; missing var annotations on mutable state — while staying silent on
; "function lacks ``-> None``" which is documentation-debt, not a bug.
;
; Trajectory: tighten by adding ``disallow_untyped_defs = True`` per
; module after that module's annotations have been backfilled.
;
; Add a module to the strict pilot by adding a `[mypy-portfolio.<name>]`
; section. Don't switch the global default to strict — the rest of the
; codebase isn't annotated and would block every merge.

[mypy]
python_version = 3.11
follow_imports = silent
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
no_implicit_optional = True
show_error_codes = True
show_column_numbers = True
; Don't fail on untyped third-party / legacy module calls — the strict
; pilot below covers what we actually care about.
;
; Codex 2026-05-10: ``assignment`` and ``arg-type`` are the highest-signal
; checks for "Claude changed a shape or callsite" — the very class of bug
; this pilot exists to catch. Removed them from the global suppression so
; the strict-pilot modules see them; legacy modules don't import these
; codes through follow_imports=silent.
disable_error_code = no-untyped-call,attr-defined

; ──────────────────────────────────────────────────────────────────────
; Strict pilot — 2026-05-10
; Focus: catch SHARP type errors (wrong index types, Any leaks, missing
; var annotations on mutable state). Defer cosmetic missing annotations.
; ──────────────────────────────────────────────────────────────────────

[mypy-portfolio.signal_engine]
check_untyped_defs = True
warn_return_any = True
no_implicit_reexport = True

[mypy-portfolio.portfolio_mgr]
check_untyped_defs = True
warn_return_any = True
no_implicit_reexport = True

[mypy-portfolio.risk_management]
check_untyped_defs = True
warn_return_any = True
no_implicit_reexport = True

[mypy-portfolio.loop_contract]
check_untyped_defs = True
warn_return_any = True
no_implicit_reexport = True
